services:
  web:
    build: .
    ports:
      - "5173:5173"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=llama3.2
    depends_on:
      ollama-init:
        condition: service_completed_successfully

  # Pulls the model once, then exits
  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "ollama serve &
             sleep 4 &&
             ollama pull llama3.2 &&
             kill %1"

  # Actual Ollama server (reuses pulled model from volume)
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
